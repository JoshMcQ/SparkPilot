name: sparkpilot-ci-cd

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: sparkpilot-ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_DIR: infra/terraform/control-plane

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  ui-build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Build UI
        env:
          NEXT_PUBLIC_OIDC_ISSUER: https://auth.example.com
          NEXT_PUBLIC_OIDC_CLIENT_ID: sparkpilot-ui
          NEXT_PUBLIC_OIDC_REDIRECT_URI: https://app.example.com/auth/callback
          NEXT_PUBLIC_OIDC_AUDIENCE: sparkpilot-api
          NEXT_PUBLIC_ENABLE_MANUAL_TOKEN_MODE: "false"
        run: npm run build

  terraform-validate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform fmt check (control-plane)
        run: terraform fmt -check -recursive infra/terraform/control-plane

      - name: Terraform init + validate (control-plane)
        run: |
          terraform -chdir=infra/terraform/control-plane init -backend=false -input=false -no-color
          terraform -chdir=infra/terraform/control-plane validate -no-color

      - name: Terraform validate (full-byoc modules)
        shell: bash
        run: bash scripts/terraform/validate_full_byoc.sh

  e2e-local-smoke:
    needs: [test, ui-build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SMOKE_ARTIFACT_DIR: output/ci/e2e-local-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create smoke artifact directory
        shell: bash
        run: mkdir -p "${SMOKE_ARTIFACT_DIR}"

      - name: Run local stack smoke flow
        shell: bash
        env:
          SMOKE_COMPOSE_BUILD: "true"
          SMOKE_STACK_STARTUP_ATTEMPTS: "3"
          SMOKE_STACK_RETRY_DELAY_SECONDS: "5"
          SMOKE_STACK_WAIT_TIMEOUT_SECONDS: "300"
          SMOKE_STACK_WAIT_POLL_SECONDS: "5"
          SMOKE_FLOW_ATTEMPTS: "2"
          SMOKE_FLOW_RETRY_DELAY_SECONDS: "10"
          SMOKE_FLOW_TIMEOUT_SECONDS: "420"
          SMOKE_PRESERVE_STACK_ON_FAILURE: "true"
        run: bash scripts/smoke/run_local_stack_smoke.sh

      - name: Capture compose diagnostics on smoke failure
        if: failure()
        shell: bash
        run: |
          mkdir -p "${SMOKE_ARTIFACT_DIR}"
          docker compose ps -a > "${SMOKE_ARTIFACT_DIR}/workflow_docker_compose_ps.txt" 2>&1 || true
          docker compose logs --no-color --timestamps > "${SMOKE_ARTIFACT_DIR}/workflow_docker_compose_logs.txt" 2>&1 || true
          docker compose down -v > "${SMOKE_ARTIFACT_DIR}/workflow_docker_compose_down.txt" 2>&1 || true

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-local-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.SMOKE_ARTIFACT_DIR }}
          retention-days: 14
          if-no-files-found: ignore

  security-scan:
    needs: [test, ui-build, terraform-validate, e2e-local-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Trivy FS scan
        run: |
          trivy fs . \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --skip-dirs ".venv,.venv-1,node_modules" \
            --ignore-unfixed \
            --no-progress

  deploy-dev:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: security-scan
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preflight - validate required secrets
        id: preflight
        shell: bash
        env:
          DEPLOY_ENV: dev
          DEPLOY_ENABLED: ${{ vars.DEV_DEPLOY_ENABLED || 'false' }}
          ROLE_ARN: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ secrets.DEV_TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.DEV_TF_LOCK_TABLE }}
          VPC_ID: ${{ secrets.DEV_VPC_ID }}
          PRIVATE_SUBNET_IDS_JSON: ${{ secrets.DEV_PRIVATE_SUBNET_IDS_JSON }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
          OIDC_ISSUER: ${{ secrets.DEV_OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.DEV_OIDC_AUDIENCE }}
          OIDC_JWKS_URI: ${{ secrets.DEV_OIDC_JWKS_URI }}
          BOOTSTRAP_SECRET: ${{ secrets.DEV_BOOTSTRAP_SECRET }}
          TF_VAR_api_desired_count: ${{ vars.DEV_API_DESIRED_COUNT || '1' }}
          TF_VAR_worker_desired_count: ${{ vars.DEV_WORKER_DESIRED_COUNT || '0' }}
          TF_VAR_ui_desired_count: ${{ vars.DEV_UI_DESIRED_COUNT || '0' }}
          TF_VAR_db_instance_class: ${{ vars.DEV_DB_INSTANCE_CLASS || 'db.t4g.micro' }}
          EMR_EXECUTION_ROLE_ARN: ${{ secrets.DEV_EMR_EXECUTION_ROLE_ARN }}
        run: bash scripts/ci/deploy_preflight.sh

      - name: Configure AWS credentials
        if: steps.preflight.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Docker Buildx
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Setup Terraform
        if: steps.preflight.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Login to ECR
        if: steps.preflight.outputs.skip != 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories
        if: steps.preflight.outputs.skip != 'true'
        id: repos
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-repositories --repository-names sparkpilot-api-dev >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-api-dev --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-api-dev --image-scanning-configuration scanOnPush=true >/dev/null

          aws ecr describe-repositories --repository-names sparkpilot-worker-dev >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-worker-dev --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-worker-dev --image-scanning-configuration scanOnPush=true >/dev/null

          aws ecr describe-repositories --repository-names sparkpilot-ui-dev >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-ui-dev --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-ui-dev --image-scanning-configuration scanOnPush=true >/dev/null

          echo "api_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-api-dev" >> "$GITHUB_OUTPUT"
          echo "worker_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-worker-dev" >> "$GITHUB_OUTPUT"
          echo "ui_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-ui-dev" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.api_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.api_repo }}:latest

      - name: Build and push worker image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.worker_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.worker_repo }}:latest

      - name: Build and push UI image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ui.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.ui_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.ui_repo }}:latest
          build-args: |
            NEXT_PUBLIC_OIDC_ISSUER=${{ secrets.DEV_OIDC_ISSUER }}
            NEXT_PUBLIC_OIDC_CLIENT_ID=${{ secrets.DEV_OIDC_CLIENT_ID }}
            NEXT_PUBLIC_OIDC_REDIRECT_URI=${{ vars.DEV_UI_APP_BASE_URL }}/auth/callback
            NEXT_PUBLIC_OIDC_AUDIENCE=sparkpilot-api
            NEXT_PUBLIC_SPARKPILOT_API_PREFIX=${{ vars.DEV_SPARKPILOT_API_PREFIX || '/api/sparkpilot' }}
            NEXT_PUBLIC_COGNITO_IDENTITY_PROVIDER=${{ vars.DEV_COGNITO_IDENTITY_PROVIDER || '' }}

      - name: Terraform deploy (dev)
        if: steps.preflight.outputs.skip != 'true'
        id: terraform_deploy
        shell: bash
        env:
          SPARKPILOT_ENVIRONMENT: dev
          TERRAFORM_DIR: ${{ env.TERRAFORM_DIR }}
          AWS_REGION: ${{ env.AWS_REGION }}
          TF_STATE_BUCKET: ${{ secrets.DEV_TF_STATE_BUCKET }}
          TF_STATE_KEY: sparkpilot/control-plane/dev.tfstate
          TF_LOCK_TABLE: ${{ secrets.DEV_TF_LOCK_TABLE }}
          VPC_ID: ${{ secrets.DEV_VPC_ID }}
          PRIVATE_SUBNET_IDS_JSON: ${{ secrets.DEV_PRIVATE_SUBNET_IDS_JSON }}
          PUBLIC_SUBNET_IDS_JSON: ${{ secrets.DEV_PUBLIC_SUBNET_IDS_JSON || '[]' }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
          API_IMAGE_URI: ${{ steps.repos.outputs.api_repo }}:${{ github.sha }}
          WORKER_IMAGE_URI: ${{ steps.repos.outputs.worker_repo }}:${{ github.sha }}
          OIDC_ISSUER: ${{ secrets.DEV_OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.DEV_OIDC_AUDIENCE }}
          OIDC_JWKS_URI: ${{ secrets.DEV_OIDC_JWKS_URI }}
          BOOTSTRAP_SECRET: ${{ secrets.DEV_BOOTSTRAP_SECRET }}
          TF_VAR_api_desired_count: ${{ vars.DEV_API_DESIRED_COUNT || '1' }}
          TF_VAR_worker_desired_count: ${{ vars.DEV_WORKER_DESIRED_COUNT || '0' }}
          TF_VAR_ui_desired_count: ${{ vars.DEV_UI_DESIRED_COUNT || '0' }}
          TF_VAR_db_instance_class: ${{ vars.DEV_DB_INSTANCE_CLASS || 'db.t4g.micro' }}
          DRY_RUN_MODE: ${{ vars.DEV_DRY_RUN_MODE || 'false' }}
          ENABLE_FULL_BYOC_MODE: ${{ vars.DEV_ENABLE_FULL_BYOC_MODE || 'false' }}
          ALLOW_UNSAFE_RDS_CONFIGURATION: ${{ vars.DEV_ALLOW_UNSAFE_RDS_CONFIGURATION || 'false' }}
          RDS_DELETION_PROTECTION: ${{ vars.DEV_RDS_DELETION_PROTECTION || '' }}
          RDS_SKIP_FINAL_SNAPSHOT: ${{ vars.DEV_RDS_SKIP_FINAL_SNAPSHOT || '' }}
          RDS_FINAL_SNAPSHOT_IDENTIFIER: ${{ vars.DEV_RDS_FINAL_SNAPSHOT_IDENTIFIER || '' }}
          EMR_EXECUTION_ROLE_ARN: ${{ secrets.DEV_EMR_EXECUTION_ROLE_ARN }}
          ASSUME_ROLE_EXTERNAL_ID: ${{ secrets.DEV_ASSUME_ROLE_EXTERNAL_ID || '' }}
          CUR_ATHENA_DATABASE: ${{ vars.DEV_CUR_ATHENA_DATABASE || '' }}
          CUR_ATHENA_TABLE: ${{ vars.DEV_CUR_ATHENA_TABLE || '' }}
          CUR_ATHENA_WORKGROUP: ${{ vars.DEV_CUR_ATHENA_WORKGROUP || 'primary' }}
          CUR_ATHENA_OUTPUT_LOCATION: ${{ vars.DEV_CUR_ATHENA_OUTPUT_LOCATION || '' }}
          CUR_RUN_ID_COLUMN: ${{ vars.DEV_CUR_RUN_ID_COLUMN || 'resource_tags_user_sparkpilot_run_id' }}
          CUR_COST_COLUMN: ${{ vars.DEV_CUR_COST_COLUMN || 'line_item_unblended_cost' }}
          COST_CENTER_POLICY_JSON: ${{ vars.DEV_COST_CENTER_POLICY_JSON || '' }}
          ACM_CERTIFICATE_ARN: ${{ secrets.DEV_ACM_CERTIFICATE_ARN || '' }}
          CORS_ORIGINS: ${{ vars.DEV_CORS_ORIGINS || 'http://localhost:3000' }}
          UI_IMAGE_URI: ${{ steps.repos.outputs.ui_repo }}:${{ github.sha }}
          UI_API_BASE_URL: ${{ vars.DEV_UI_API_BASE_URL || '' }}
          ENABLE_ECS_EXEC: ${{ vars.DEV_ENABLE_ECS_EXEC || 'false' }}
        run: bash scripts/terraform/deploy_control_plane.sh

      - name: Smoke check deployed API (dev)
        if: steps.preflight.outputs.skip != 'true'
        shell: bash
        env:
          API_BASE_URL: ${{ steps.terraform_deploy.outputs.api_base_url }}
          ECS_CLUSTER_NAME: ${{ steps.terraform_deploy.outputs.ecs_cluster_name }}
          ECS_API_SERVICE_NAME: ${{ steps.terraform_deploy.outputs.ecs_api_service_name }}
          ALB_INTERNAL: ${{ steps.terraform_deploy.outputs.alb_internal }}
          AWS_REGION: ${{ env.AWS_REGION }}
          SMOKE_MAX_ATTEMPTS: "30"
          SMOKE_SLEEP_SECONDS: "5"
        run: bash scripts/smoke/control_plane_api.sh

  deploy-staging:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preflight - validate required secrets
        id: preflight
        shell: bash
        env:
          DEPLOY_ENV: staging
          DEPLOY_ENABLED: ${{ vars.STAGING_DEPLOY_ENABLED || 'true' }}
          ROLE_ARN: ${{ secrets.AWS_STAGING_DEPLOY_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ secrets.STAGING_TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.STAGING_TF_LOCK_TABLE }}
          VPC_ID: ${{ secrets.STAGING_VPC_ID }}
          PRIVATE_SUBNET_IDS_JSON: ${{ secrets.STAGING_PRIVATE_SUBNET_IDS_JSON }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          OIDC_ISSUER: ${{ secrets.STAGING_OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.STAGING_OIDC_AUDIENCE }}
          OIDC_JWKS_URI: ${{ secrets.STAGING_OIDC_JWKS_URI }}
          BOOTSTRAP_SECRET: ${{ secrets.STAGING_BOOTSTRAP_SECRET }}
          TF_VAR_api_desired_count: ${{ vars.STAGING_API_DESIRED_COUNT || '1' }}
          TF_VAR_worker_desired_count: ${{ vars.STAGING_WORKER_DESIRED_COUNT || '1' }}
          TF_VAR_ui_desired_count: ${{ vars.STAGING_UI_DESIRED_COUNT || '1' }}
          TF_VAR_db_instance_class: ${{ vars.STAGING_DB_INSTANCE_CLASS || 'db.t4g.small' }}
          EMR_EXECUTION_ROLE_ARN: ${{ secrets.STAGING_EMR_EXECUTION_ROLE_ARN }}
        run: bash scripts/ci/deploy_preflight.sh

      - name: Configure AWS credentials
        if: steps.preflight.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Docker Buildx
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Setup Terraform
        if: steps.preflight.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Login to ECR
        if: steps.preflight.outputs.skip != 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories
        if: steps.preflight.outputs.skip != 'true'
        id: repos
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-repositories --repository-names sparkpilot-api-staging >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-api-staging --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-api-staging --image-scanning-configuration scanOnPush=true >/dev/null

          aws ecr describe-repositories --repository-names sparkpilot-worker-staging >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-worker-staging --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-worker-staging --image-scanning-configuration scanOnPush=true >/dev/null

          aws ecr describe-repositories --repository-names sparkpilot-ui-staging >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-ui-staging --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-ui-staging --image-scanning-configuration scanOnPush=true >/dev/null

          echo "api_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-api-staging" >> "$GITHUB_OUTPUT"
          echo "worker_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-worker-staging" >> "$GITHUB_OUTPUT"
          echo "ui_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-ui-staging" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.api_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.api_repo }}:latest

      - name: Build and push worker image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.worker_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.worker_repo }}:latest

      - name: Build and push UI image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ui.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.ui_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.ui_repo }}:latest
          build-args: |
            NEXT_PUBLIC_OIDC_ISSUER=${{ secrets.STAGING_OIDC_ISSUER }}
            NEXT_PUBLIC_OIDC_CLIENT_ID=${{ secrets.STAGING_OIDC_CLIENT_ID }}
            NEXT_PUBLIC_OIDC_REDIRECT_URI=${{ vars.STAGING_UI_APP_BASE_URL }}/auth/callback
            NEXT_PUBLIC_OIDC_AUDIENCE=sparkpilot-api
            NEXT_PUBLIC_SPARKPILOT_API_PREFIX=${{ vars.STAGING_SPARKPILOT_API_PREFIX || '/api/sparkpilot' }}
            NEXT_PUBLIC_COGNITO_IDENTITY_PROVIDER=${{ vars.STAGING_COGNITO_IDENTITY_PROVIDER || '' }}

      - name: Terraform deploy (staging)
        if: steps.preflight.outputs.skip != 'true'
        id: terraform_deploy
        shell: bash
        env:
          SPARKPILOT_ENVIRONMENT: staging
          TERRAFORM_DIR: ${{ env.TERRAFORM_DIR }}
          AWS_REGION: ${{ env.AWS_REGION }}
          TF_STATE_BUCKET: ${{ secrets.STAGING_TF_STATE_BUCKET }}
          TF_STATE_KEY: sparkpilot/control-plane/staging.tfstate
          TF_LOCK_TABLE: ${{ secrets.STAGING_TF_LOCK_TABLE }}
          VPC_ID: ${{ secrets.STAGING_VPC_ID }}
          PRIVATE_SUBNET_IDS_JSON: ${{ secrets.STAGING_PRIVATE_SUBNET_IDS_JSON }}
          PUBLIC_SUBNET_IDS_JSON: ${{ secrets.STAGING_PUBLIC_SUBNET_IDS_JSON || '[]' }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          API_IMAGE_URI: ${{ steps.repos.outputs.api_repo }}:${{ github.sha }}
          WORKER_IMAGE_URI: ${{ steps.repos.outputs.worker_repo }}:${{ github.sha }}
          OIDC_ISSUER: ${{ secrets.STAGING_OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.STAGING_OIDC_AUDIENCE }}
          OIDC_JWKS_URI: ${{ secrets.STAGING_OIDC_JWKS_URI }}
          BOOTSTRAP_SECRET: ${{ secrets.STAGING_BOOTSTRAP_SECRET }}
          TF_VAR_api_desired_count: ${{ vars.STAGING_API_DESIRED_COUNT || '1' }}
          TF_VAR_worker_desired_count: ${{ vars.STAGING_WORKER_DESIRED_COUNT || '1' }}
          TF_VAR_ui_desired_count: ${{ vars.STAGING_UI_DESIRED_COUNT || '1' }}
          TF_VAR_db_instance_class: ${{ vars.STAGING_DB_INSTANCE_CLASS || 'db.t4g.small' }}
          TF_VAR_manage_vpc_endpoints: ${{ vars.STAGING_MANAGE_VPC_ENDPOINTS || 'false' }}
          DRY_RUN_MODE: ${{ vars.STAGING_DRY_RUN_MODE || 'false' }}
          ENABLE_FULL_BYOC_MODE: ${{ vars.STAGING_ENABLE_FULL_BYOC_MODE || 'false' }}
          ALLOW_UNSAFE_RDS_CONFIGURATION: ${{ vars.STAGING_ALLOW_UNSAFE_RDS_CONFIGURATION || 'false' }}
          RDS_DELETION_PROTECTION: ${{ vars.STAGING_RDS_DELETION_PROTECTION || '' }}
          RDS_SKIP_FINAL_SNAPSHOT: ${{ vars.STAGING_RDS_SKIP_FINAL_SNAPSHOT || '' }}
          RDS_FINAL_SNAPSHOT_IDENTIFIER: ${{ vars.STAGING_RDS_FINAL_SNAPSHOT_IDENTIFIER || '' }}
          EMR_EXECUTION_ROLE_ARN: ${{ secrets.STAGING_EMR_EXECUTION_ROLE_ARN }}
          ASSUME_ROLE_EXTERNAL_ID: ${{ secrets.STAGING_ASSUME_ROLE_EXTERNAL_ID || '' }}
          CUR_ATHENA_DATABASE: ${{ vars.STAGING_CUR_ATHENA_DATABASE || '' }}
          CUR_ATHENA_TABLE: ${{ vars.STAGING_CUR_ATHENA_TABLE || '' }}
          CUR_ATHENA_WORKGROUP: ${{ vars.STAGING_CUR_ATHENA_WORKGROUP || 'primary' }}
          CUR_ATHENA_OUTPUT_LOCATION: ${{ vars.STAGING_CUR_ATHENA_OUTPUT_LOCATION || '' }}
          CUR_RUN_ID_COLUMN: ${{ vars.STAGING_CUR_RUN_ID_COLUMN || 'resource_tags_user_sparkpilot_run_id' }}
          CUR_COST_COLUMN: ${{ vars.STAGING_CUR_COST_COLUMN || 'line_item_unblended_cost' }}
          COST_CENTER_POLICY_JSON: ${{ vars.STAGING_COST_CENTER_POLICY_JSON || '' }}
          ACM_CERTIFICATE_ARN: ${{ secrets.STAGING_ACM_CERTIFICATE_ARN || '' }}
          CLOUDFLARE_PROXIED: ${{ vars.STAGING_CLOUDFLARE_PROXIED || 'false' }}
          CORS_ORIGINS: ${{ vars.STAGING_CORS_ORIGINS || '' }}
          UI_IMAGE_URI: ${{ steps.repos.outputs.ui_repo }}:${{ github.sha }}
          UI_API_BASE_URL: ${{ vars.STAGING_UI_API_BASE_URL || '' }}
          ENABLE_ECS_EXEC: ${{ vars.STAGING_ENABLE_ECS_EXEC || 'false' }}
        run: bash scripts/terraform/deploy_control_plane.sh

      - name: Smoke check deployed API (staging)
        if: steps.preflight.outputs.skip != 'true'
        shell: bash
        env:
          API_BASE_URL: ${{ steps.terraform_deploy.outputs.api_base_url }}
          ECS_CLUSTER_NAME: ${{ steps.terraform_deploy.outputs.ecs_cluster_name }}
          ECS_API_SERVICE_NAME: ${{ steps.terraform_deploy.outputs.ecs_api_service_name }}
          ALB_INTERNAL: ${{ steps.terraform_deploy.outputs.alb_internal }}
          AWS_REGION: ${{ env.AWS_REGION }}
          SMOKE_MAX_ATTEMPTS: "40"
          SMOKE_SLEEP_SECONDS: "5"
        run: bash scripts/smoke/control_plane_api.sh

  deploy-prod:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preflight - validate required secrets
        id: preflight
        shell: bash
        env:
          DEPLOY_ENV: prod
          DEPLOY_ENABLED: ${{ vars.PROD_DEPLOY_ENABLED || 'false' }}
          ROLE_ARN: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ secrets.PROD_TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.PROD_TF_LOCK_TABLE }}
          VPC_ID: ${{ secrets.PROD_VPC_ID }}
          PRIVATE_SUBNET_IDS_JSON: ${{ secrets.PROD_PRIVATE_SUBNET_IDS_JSON }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          OIDC_ISSUER: ${{ secrets.PROD_OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.PROD_OIDC_AUDIENCE }}
          OIDC_JWKS_URI: ${{ secrets.PROD_OIDC_JWKS_URI }}
          BOOTSTRAP_SECRET: ${{ secrets.PROD_BOOTSTRAP_SECRET }}
          TF_VAR_api_desired_count: ${{ vars.PROD_API_DESIRED_COUNT || '1' }}
          TF_VAR_worker_desired_count: ${{ vars.PROD_WORKER_DESIRED_COUNT || '1' }}
          TF_VAR_ui_desired_count: ${{ vars.PROD_UI_DESIRED_COUNT || '1' }}
          TF_VAR_db_instance_class: ${{ vars.PROD_DB_INSTANCE_CLASS || 'db.t4g.medium' }}
          EMR_EXECUTION_ROLE_ARN: ${{ secrets.PROD_EMR_EXECUTION_ROLE_ARN }}
        run: bash scripts/ci/deploy_preflight.sh

      - name: Configure AWS credentials
        if: steps.preflight.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Docker Buildx
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Setup Terraform
        if: steps.preflight.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Login to ECR
        if: steps.preflight.outputs.skip != 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories
        if: steps.preflight.outputs.skip != 'true'
        id: repos
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-repositories --repository-names sparkpilot-api-prod >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-api-prod --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-api-prod --image-scanning-configuration scanOnPush=true >/dev/null

          aws ecr describe-repositories --repository-names sparkpilot-worker-prod >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-worker-prod --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-worker-prod --image-scanning-configuration scanOnPush=true >/dev/null

          aws ecr describe-repositories --repository-names sparkpilot-ui-prod >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sparkpilot-ui-prod --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr put-image-scanning-configuration --repository-name sparkpilot-ui-prod --image-scanning-configuration scanOnPush=true >/dev/null

          echo "api_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-api-prod" >> "$GITHUB_OUTPUT"
          echo "worker_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-worker-prod" >> "$GITHUB_OUTPUT"
          echo "ui_repo=${{ steps.ecr.outputs.registry }}/sparkpilot-ui-prod" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.api_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.api_repo }}:latest

      - name: Build and push worker image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.worker_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.worker_repo }}:latest

      - name: Build and push UI image
        if: steps.preflight.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ui.Dockerfile
          push: true
          tags: |
            ${{ steps.repos.outputs.ui_repo }}:${{ github.sha }}
            ${{ steps.repos.outputs.ui_repo }}:latest
          build-args: |
            NEXT_PUBLIC_OIDC_ISSUER=${{ secrets.PROD_OIDC_ISSUER }}
            NEXT_PUBLIC_OIDC_CLIENT_ID=${{ secrets.PROD_OIDC_CLIENT_ID }}
            NEXT_PUBLIC_OIDC_REDIRECT_URI=${{ vars.PROD_UI_APP_BASE_URL }}/auth/callback
            NEXT_PUBLIC_OIDC_AUDIENCE=sparkpilot-api
            NEXT_PUBLIC_SPARKPILOT_API_PREFIX=${{ vars.PROD_SPARKPILOT_API_PREFIX || '/api/sparkpilot' }}
            NEXT_PUBLIC_COGNITO_IDENTITY_PROVIDER=${{ vars.PROD_COGNITO_IDENTITY_PROVIDER || '' }}

      - name: Terraform deploy (prod)
        if: steps.preflight.outputs.skip != 'true'
        id: terraform_deploy
        shell: bash
        env:
          SPARKPILOT_ENVIRONMENT: prod
          TERRAFORM_DIR: ${{ env.TERRAFORM_DIR }}
          AWS_REGION: ${{ env.AWS_REGION }}
          TF_STATE_BUCKET: ${{ secrets.PROD_TF_STATE_BUCKET }}
          TF_STATE_KEY: sparkpilot/control-plane/prod.tfstate
          TF_LOCK_TABLE: ${{ secrets.PROD_TF_LOCK_TABLE }}
          VPC_ID: ${{ secrets.PROD_VPC_ID }}
          PRIVATE_SUBNET_IDS_JSON: ${{ secrets.PROD_PRIVATE_SUBNET_IDS_JSON }}
          PUBLIC_SUBNET_IDS_JSON: ${{ secrets.PROD_PUBLIC_SUBNET_IDS_JSON || '[]' }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          API_IMAGE_URI: ${{ steps.repos.outputs.api_repo }}:${{ github.sha }}
          WORKER_IMAGE_URI: ${{ steps.repos.outputs.worker_repo }}:${{ github.sha }}
          OIDC_ISSUER: ${{ secrets.PROD_OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.PROD_OIDC_AUDIENCE }}
          OIDC_JWKS_URI: ${{ secrets.PROD_OIDC_JWKS_URI }}
          BOOTSTRAP_SECRET: ${{ secrets.PROD_BOOTSTRAP_SECRET }}
          TF_VAR_api_desired_count: ${{ vars.PROD_API_DESIRED_COUNT || '1' }}
          TF_VAR_worker_desired_count: ${{ vars.PROD_WORKER_DESIRED_COUNT || '1' }}
          TF_VAR_ui_desired_count: ${{ vars.PROD_UI_DESIRED_COUNT || '1' }}
          TF_VAR_db_instance_class: ${{ vars.PROD_DB_INSTANCE_CLASS || 'db.t4g.medium' }}
          TF_VAR_manage_vpc_endpoints: ${{ vars.PROD_MANAGE_VPC_ENDPOINTS || 'false' }}
          DRY_RUN_MODE: ${{ vars.PROD_DRY_RUN_MODE || 'false' }}
          ENABLE_FULL_BYOC_MODE: ${{ vars.PROD_ENABLE_FULL_BYOC_MODE || 'false' }}
          ALLOW_UNSAFE_RDS_CONFIGURATION: ${{ vars.PROD_ALLOW_UNSAFE_RDS_CONFIGURATION || 'false' }}
          RDS_DELETION_PROTECTION: ${{ vars.PROD_RDS_DELETION_PROTECTION || '' }}
          RDS_SKIP_FINAL_SNAPSHOT: ${{ vars.PROD_RDS_SKIP_FINAL_SNAPSHOT || '' }}
          RDS_FINAL_SNAPSHOT_IDENTIFIER: ${{ vars.PROD_RDS_FINAL_SNAPSHOT_IDENTIFIER || '' }}
          EMR_EXECUTION_ROLE_ARN: ${{ secrets.PROD_EMR_EXECUTION_ROLE_ARN }}
          ASSUME_ROLE_EXTERNAL_ID: ${{ secrets.PROD_ASSUME_ROLE_EXTERNAL_ID || '' }}
          CUR_ATHENA_DATABASE: ${{ vars.PROD_CUR_ATHENA_DATABASE || '' }}
          CUR_ATHENA_TABLE: ${{ vars.PROD_CUR_ATHENA_TABLE || '' }}
          CUR_ATHENA_WORKGROUP: ${{ vars.PROD_CUR_ATHENA_WORKGROUP || 'primary' }}
          CUR_ATHENA_OUTPUT_LOCATION: ${{ vars.PROD_CUR_ATHENA_OUTPUT_LOCATION || '' }}
          CUR_RUN_ID_COLUMN: ${{ vars.PROD_CUR_RUN_ID_COLUMN || 'resource_tags_user_sparkpilot_run_id' }}
          CUR_COST_COLUMN: ${{ vars.PROD_CUR_COST_COLUMN || 'line_item_unblended_cost' }}
          COST_CENTER_POLICY_JSON: ${{ vars.PROD_COST_CENTER_POLICY_JSON || '' }}
          ACM_CERTIFICATE_ARN: ${{ secrets.PROD_ACM_CERTIFICATE_ARN || '' }}
          CLOUDFLARE_PROXIED: ${{ vars.PROD_CLOUDFLARE_PROXIED || 'false' }}
          CORS_ORIGINS: ${{ vars.PROD_CORS_ORIGINS || '' }}
          UI_IMAGE_URI: ${{ steps.repos.outputs.ui_repo }}:${{ github.sha }}
          UI_API_BASE_URL: ${{ vars.PROD_UI_API_BASE_URL || '' }}
          ENABLE_ECS_EXEC: ${{ vars.PROD_ENABLE_ECS_EXEC || 'false' }}
        run: bash scripts/terraform/deploy_control_plane.sh

      - name: Smoke check deployed API (prod)
        if: steps.preflight.outputs.skip != 'true'
        shell: bash
        env:
          API_BASE_URL: ${{ steps.terraform_deploy.outputs.api_base_url }}
          ECS_CLUSTER_NAME: ${{ steps.terraform_deploy.outputs.ecs_cluster_name }}
          ECS_API_SERVICE_NAME: ${{ steps.terraform_deploy.outputs.ecs_api_service_name }}
          ALB_INTERNAL: ${{ steps.terraform_deploy.outputs.alb_internal }}
          AWS_REGION: ${{ env.AWS_REGION }}
          SMOKE_MAX_ATTEMPTS: "40"
          SMOKE_SLEEP_SECONDS: "5"
        run: bash scripts/smoke/control_plane_api.sh

