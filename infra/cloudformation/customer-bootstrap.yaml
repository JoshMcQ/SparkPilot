AWSTemplateFormatVersion: "2010-09-09"
Description: "SparkPilot customer bootstrap role for BYOC environment provisioning"

Parameters:
  SparkPilotControlPlaneAccountId:
    Type: String
    Description: "SparkPilot control plane AWS account ID"
  ExternalId:
    Type: String
    Description: "External ID provided by SparkPilot"
  RoleName:
    Type: String
    Default: SparkPilotControlPlaneRole
    Description: "Role name to create for SparkPilot"

Resources:
  SparkPilotControlPlaneRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${SparkPilotControlPlaneAccountId}:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      Policies:
        - PolicyName: SparkPilotProvisioningPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: InfrastructureReadOnly
                Effect: Allow
                Action:
                  - ec2:Describe*
                  - eks:DescribeCluster
                  - eks:DescribeNodegroup
                  - eks:List*
                  - iam:GetRole
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - cloudformation:DescribeStacks
                  - kms:DescribeKey
                Resource: "*"

              - Sid: TaggedVpcEksProvisioning
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:CreateInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:CreateNatGateway
                  - ec2:DeleteNatGateway
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:CreateSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoints
                  - eks:CreateCluster
                  - eks:DeleteCluster
                  - eks:CreateNodegroup
                  - eks:DeleteNodegroup
                Resource: "*"
                Condition:
                  StringEqualsIfExists:
                    "aws:RequestTag/sparkpilot:managed": "true"
                    "aws:ResourceTag/sparkpilot:managed": "true"

              - Sid: EmrOnEksCreateVirtualCluster
                Effect: Allow
                Action:
                  - emr-containers:CreateVirtualCluster
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:RequestTag/sparkpilot:managed": "true"

              - Sid: EmrOnEksManagedResources
                Effect: Allow
                Action:
                  - emr-containers:DeleteVirtualCluster
                  - emr-containers:DescribeVirtualCluster
                  - emr-containers:ListVirtualClusters
                  - emr-containers:StartJobRun
                  - emr-containers:CancelJobRun
                  - emr-containers:DescribeJobRun
                  - emr-containers:ListJobRuns
                Resource:
                  - !Sub "arn:aws:emr-containers:*:${AWS::AccountId}:/virtualclusters/*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/sparkpilot:managed": "true"

              - Sid: ManagedLogAccess
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - logs:FilterLogEvents
                Resource:
                  - !Sub "arn:aws:logs:*:${AWS::AccountId}:log-group:/sparkpilot/*"

              - Sid: IamCreateManagedArtifacts
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:CreatePolicy
                Resource: "*"
                Condition:
                  StringEqualsIfExists:
                    "aws:RequestTag/sparkpilot:managed": "true"

              - Sid: IamManageSparkPilotArtifacts
                Effect: Allow
                Action:
                  - iam:DeleteRole
                  - iam:DeletePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:UpdateAssumeRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/SparkPilot*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:policy/SparkPilot*"
                Condition:
                  StringEqualsIfExists:
                    "aws:ResourceTag/sparkpilot:managed": "true"

              - Sid: PassExecutionRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/SparkPilotEmrExecution*"
                Condition:
                  StringEquals:
                    "iam:PassedToService": "emr-containers.amazonaws.com"

              - Sid: SparkPilotManagedArtifactStorage
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::sparkpilot-*/*"

              - Sid: SparkPilotManagedArtifactStorageList
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::sparkpilot-*"

Outputs:
  SparkPilotRoleArn:
    Description: "Role ARN to register in SparkPilot tenant environment config"
    Value: !GetAtt SparkPilotControlPlaneRole.Arn
  ExternalId:
    Description: "External ID used in trust relationship"
    Value: !Ref ExternalId
